<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВТБ Анимация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Логотип ВТБ (Официальная SVG геометрия крыльев) -->
        <div class="logo-container" id="logo">
            <svg class="vtb-logo" viewBox="0 0 400 130" xmlns="w3.org">
                <!-- Синие крылья ВТБ -->
                <path d="M0 20 L110 20 L80 65 L0 65 Z" fill="#00AAFF"/>
                <path d="M125 20 L275 20 L245 65 L155 65 Z" fill="#FFFFFF"/>
                <path d="M0 77 L230 77 L200 122 L0 122 Z" fill="#00AAFF"/>
                <!-- Текстовая часть (упрощенный шрифт ВТБ для примера) -->
                <text x="290" y="75" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="900" font-size="65">ВТБ</text>
            </svg>
        </div>

        <!-- Строки объявления -->
        <div class="announcement">
            <div class="line" id="line1">Выгодный кредит наличными</div>
            <div class="line" id="line2">От 4.5% годовых на всё</div>
        </div>

        <!-- Кнопка -->
        <div class="btn-container">
            <button class="buy-btn" id="buyBtn">Купить</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
</body>
</html>
